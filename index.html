<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Labs.Andersn.cdn</title>
    <link rel="manifest" href="manifest.json">
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body {
            background-color: #0a0d10;
            color: #00ff66;
            font-family: 'Courier New', Courier, monospace;
            padding: 15px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }
        .header {
            text-align: center;
            margin-bottom: 15px;
        }
        .header h1 {
            font-size: 24px;
            letter-spacing: 3px;
            text-transform: uppercase;
            text-shadow: 0 0 10px rgba(0, 255, 102, 0.6);
        }
        .header p {
            color: #8892b0;
            font-size: 11px;
            margin-top: 3px;
            text-transform: uppercase;
        }
        .setup-box {
            width: 100%;
            max-width: 500px;
            background: #11161d;
            border: 1px solid #1f2937;
            border-radius: 8px;
            padding: 12px;
            margin-bottom: 15px;
            display: flex;
            gap: 8px;
        }
        .setup-box input {
            flex: 2;
            background: #0a0d10;
            border: 1px solid #00ff66;
            border-radius: 4px;
            padding: 10px;
            color: #fff;
            font-size: 14px;
            font-family: Arial, sans-serif;
            outline: none;
        }
        .setup-box select {
            flex: 1;
            background: #0a0d10;
            border: 1px solid #1f2937;
            border-radius: 4px;
            padding: 10px;
            color: #00ff66;
            font-size: 13px;
            font-family: inherit;
            outline: none;
            cursor: pointer;
        }
        .btn-add {
            background: #00ff66;
            color: #0a0d10;
            border: none;
            padding: 0 15px;
            border-radius: 4px;
            font-weight: bold;
            cursor: pointer;
            text-transform: uppercase;
            font-size: 12px;
            font-family: inherit;
        }
        .voice-status-panel {
            width: 100%;
            max-width: 500px;
            background: #161d26;
            border: 1px solid #1f2937;
            border-radius: 8px;
            padding: 12px;
            margin-bottom: 15px;
            text-align: center;
            transition: all 0.3s ease;
        }
        .btn-voice {
            width: 100%;
            padding: 12px;
            background: #00ff66;
            color: #0a0d10;
            border: none;
            border-radius: 6px;
            font-weight: bold;
            text-transform: uppercase;
            cursor: pointer;
            font-family: inherit;
            font-size: 13px;
        }
        .voice-indicator {
            margin-top: 8px;
            font-size: 11px;
            color: #8892b0;
            text-transform: uppercase;
            letter-spacing: 1px;
            font-weight: bold;
        }
        .vendors-container {
            width: 100%;
            max-width: 500px;
        }
        .vendor-card {
            background: #11161d;
            border: 1px solid #1f2937;
            border-radius: 8px;
            padding: 12px;
            margin-bottom: 12px;
            position: relative;
            box-shadow: 0 4px 10px rgba(0,0,0,0.5);
        }
        .vendor-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
            border-bottom: 1px dashed #1f2937;
            padding-bottom: 8px;
        }
        .vendor-name {
            font-size: 16px;
            font-weight: bold;
            color: #ffffff;
            font-family: Arial, sans-serif;
        }
        .btn-del {
            background: transparent;
            color: #ff3333;
            border: none;
            cursor: pointer;
            font-size: 11px;
            text-transform: uppercase;
        }
        .price-row {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 12px;
            background: #0a0d10;
            padding: 8px;
            border-radius: 6px;
            border: 1px solid #1f2937;
        }
        .price-row label {
            font-size: 11px;
            color: #8892b0;
            text-transform: uppercase;
        }
        .price-row input {
            flex: 1;
            background: transparent;
            border: none;
            border-bottom: 1px solid #00ff66;
            color: #ffffff;
            font-family: Arial, sans-serif;
            font-size: 14px;
            padding: 2px;
            outline: none;
        }
        .grid-days {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 8px;
            margin-bottom: 12px;
        }
        .day-box {
            display: flex;
            flex-direction: column;
        }
        .day-box label {
            font-size: 11px;
            color: #39ff14;
            margin-bottom: 2px;
            text-transform: uppercase;
        }
        .day-box input {
            background: #0a0d10;
            border: 1px solid #1f2937;
            border-radius: 4px;
            padding: 8px;
            color: #fff;
            font-size: 14px;
            outline: none;
            font-family: Arial, sans-serif;
            text-align: center;
        }
        .day-box input:focus {
            border-color: #00ff66;
            box-shadow: 0 0 5px rgba(0,255,102,0.5);
        }
        .vendor-summary {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(0, 255, 102, 0.05);
            padding: 10px;
            border-radius: 6px;
            border: 1px solid rgba(0, 255, 102, 0.15);
            font-size: 13px;
        }
        .total-weight-text {
            color: #8892b0;
        }
        .total-weight-text span {
            color: #ffffff;
            font-weight: bold;
        }
        .total-pay-text {
            color: #39ff14;
            font-weight: bold;
            text-align: right;
        }
        .total-pay-text span {
            font-size: 15px;
            text-shadow: 0 0 8px rgba(0, 255, 102, 0.5);
        }
        .clear-all-btn {
            margin-top: 15px;
            width: 100%;
            max-width: 500px;
            background: transparent;
            border: 1px dashed #ff3333;
            color: #ff3333;
            padding: 10px;
            border-radius: 6px;
            cursor: pointer;
            text-transform: uppercase;
            font-size: 11px;
            font-family: inherit;
        }
    </style>
</head>
<body>

    <div class="header">
        <h1>LABS</h1>
        <p>Calculadora de Cosecha por Voz</p>
    </div>

    <div class="setup-box">
        <input type="text" id="newVendorName" placeholder="Nombre recolector..." autocomplete="off">
        <select id="vendorUnit">
            <option value="@">Arrobas (@)</option>
            <option value="kg">Kilos (kg)</option>
            <option value="Lb">Libras (Lb)</option>
            <option value=" ">Neutro</option>
        </select>
        <button class="btn-add" onclick="addVendor()">+ Ok</button>
    </div>

    <div class="voice-status-panel" id="voicePanel">
        <button class="btn-voice" id="btnVoice" onclick="toggleVoiceEngine()">🎤 Activar Radar de Voz</button>
        <div class="voice-indicator" id="voiceIndicator">Sistema de voz apagado</div>
    </div>

    <div class="vendors-container" id="vendorsContainer"></div>

    <button class="clear-all-btn" onclick="clearAllData()">Resetear Cosecha Semanal</button>

    <script>
        let vendors = JSON.parse(localStorage.getItem('labs_matrix_harvest')) || [];
        let recognition;
        let isVoiceActive = false;
        let voiceState = "IDLE"; // IDLE, WAITING_FOR_COMMAND

        function saveState() {
            localStorage.setItem('labs_matrix_harvest', JSON.stringify(vendors));
        }

        function addVendor() {
            const inputName = document.getElementById('newVendorName');
            const selectUnit = document.getElementById('vendorUnit');
            const name = inputName.value.trim();
            if (!name) return;

            const newVendor = {
                id: 'v_' + Date.now(),
                name: name,
                unit: selectUnit.value,
                price: '', 
                weights: { lunes: '', martes: '', miercoles: '', jueves: '', viernes: '', sabado: '' }
            };

            vendors.push(newVendor);
            saveState();
            renderVendors();
            inputName.value = '';
            inputName.focus();
        }

        function deleteVendor(id) {
            if (confirm('¿Eliminar recolector de la lista?')) {
                vendors = vendors.filter(v => v.id !== id);
                saveState();
                renderVendors();
            }
        }

        function updateWeight(vendorId, day, value) {
            const vendor = vendors.find(v => v.id === vendorId);
            if (vendor) {
                vendor.weights[day] = value;
                saveState();
                calculateTotals(vendorId);
            }
        }

        // Delegación de eventos para capturar precios en tiempo real sin romper el render
        document.addEventListener('input', function(e) {
            if(e.target && e.target.classList.contains('price-input')) {
                const vendorId = e.target.getAttribute('data-id');
                const vendor = vendors.find(v => v.id === vendorId);
                if (vendor) {
                    vendor.price = e.target.value;
                    saveState();
                    calculateTotals(vendorId);
                }
            }
        });

        // NÚCLEO DE CÁLCULO: Mantiene la consistencia matemática en tiempo real
        function calculateTotals(vendorId) {
            const vendor = vendors.find(v => v.id === vendorId);
            if (!vendor) return;

            let totalWeight = 0;
            for (let day in vendor.weights) {
                let val = parseFloat(vendor.weights[day].toString().replace(',', '.'));
                if (!isNaN(val)) totalWeight += val;
            }

            let priceVal = parseFloat(vendor.price.toString().replace(',', '.'));
            let totalPay = 0;
            if (!isNaN(priceVal) && totalWeight > 0) {
                totalPay = totalWeight * priceVal;
            }

            // Actualización directa de la interfaz sin redibujar la tarjeta completa
            const weightEl = document.getElementById(`weight_${vendorId}`);
            const payEl = document.getElementById(`pay_${vendorId}`);
            if (weightEl) weightEl.innerText = totalWeight.toFixed(1);
            if (payEl) {
                payEl.innerText = new Intl.NumberFormat('es-CO', {
                    style: 'currency',
                    currency: 'COP',
                    minimumFractionDigits: 0,
                    maximumFractionDigits: 0
                }).format(totalPay);
            }
        }

        function renderVendors() {
            const container = document.getElementById('vendorsContainer');
            container.innerHTML = '';

            vendors.forEach(vendor => {
                const currentUnit = vendor.unit !== undefined ? vendor.unit : '@';

                const card = document.createElement('div');
                card.className = 'vendor-card';
                card.innerHTML = `
                    <div class="vendor-header">
                        <span class="vendor-name">${vendor.name}</span>
                        <button class="btn-del" onclick="deleteVendor('${vendor.id}')">Eliminar</button>
                    </div>

                    <div class="price-row">
                        <label>Precio x ${currentUnit === ' ' ? 'Unidad' : currentUnit}:</label>
                        <input type="text" 
                               inputmode="numeric" 
                               class="price-input"
                               data-id="${vendor.id}"
                               placeholder="Valor..." 
                               value="${vendor.price}">
                    </div>

                    <div class="grid-days">
                        ${['lunes', 'martes', 'miercoles', 'jueves', 'viernes', 'sabado'].map(day => `
                            <div class="day-box">
                                <label>${day.substring(0,3)}</label>
                                <input type="text" 
                                       inputmode="decimal" 
                                       class="weight-input"
                                       id="input_${vendor.id}_${day}"
                                       value="${vendor.weights[day]}" 
                                       placeholder="0"
                                       oninput="updateWeight('${vendor.id}', '${day}', this.value)">
                            </div>
                        `).join('')}
                    </div>

                    <div class="vendor-summary">
                        <div class="total-weight-text">Total: <span id="weight_${vendor.id}">0.0</span> ${currentUnit}</div>
                        <div class="total-pay-text">A Pagar: <span id="pay_${vendor.id}">$0</span></div>
                    </div>
                `;
                container.appendChild(card);
                calculateTotals(vendor.id); // Ejecuta el cálculo inicial inmediato
            });

            setupNavigation();
        }

        function setupNavigation() {
            const inputs = document.querySelectorAll('.weight-input');
            inputs.forEach((input, index) => {
                input.addEventListener('keydown', (e) => {
                    if (e.key === 'Enter') {
                        e.preventDefault();
                        const nextIndex = (index + 1) % inputs.length;
                        if (inputs[nextIndex]) inputs[nextIndex].focus();
                    }
                });
            });
        }

        // --- ENGINE DE VOZ INTELIGENTE (OFFLINE) ---
        if ('webkitSpeechRecognition' in window) {
            recognition = new webkitSpeechRecognition();
            recognition.lang = 'es-CO';
            recognition.continuous = true;
            recognition.interimResults = false;

            recognition.onresult = function(event) {
                const resultIndex = event.resultIndex;
                const phrase = event.results[resultIndex][0].transcript.toLowerCase().trim();
                console.log("Radar capturó frase: " + phrase);

                const panel = document.getElementById('voicePanel');
                const indicator = document.getElementById('voiceIndicator');

                if (voiceState === "IDLE") {
                    // Verificación estricta del comando de activación
                    if (phrase.includes('cosecha')) {
                        voiceState = "WAITING_FOR_COMMAND";
                        panel.style.borderColor = "#00ff66";
                        panel.style.boxShadow = "0 0 15px rgba(0, 255, 102, 0.4)";
                        indicator.innerText = "🔊 ESCUCHANDO... DICTA EL COMANDO";
                        indicator.style.color = "#00ff66";
                        
                        // Si mandó la orden completa de un solo tiro
                        let cleanPhrase = phrase.replace('cosecha', '').trim();
                        if (cleanPhrase.length > 3) {
                            processHarvestVoice(cleanPhrase);
                        } else {
                            // Confirmación explícita por voz de que lo está escuchando
                            speakFeedback("Te escucho, dicta");
                        }
                    }
                } else if (voiceState === "WAITING_FOR_COMMAND") {
                    processHarvestVoice(phrase);
                }
            };

            recognition.onerror = function() {
                if (isVoiceActive) restartVoiceEngine();
            };

            recognition.onend = function() {
                if (isVoiceActive) recognition.start();
            };
        }

        function toggleVoiceEngine() {
            const btn = document.getElementById('btnVoice');
            const indicator = document.getElementById('voiceIndicator');
            const panel = document.getElementById('voicePanel');

            if (!recognition) {
                alert("Este dispositivo no cuenta con controladores de voz locales.");
                return;
            }

            if (!isVoiceActive) {
                isVoiceActive = true;
                voiceState = "IDLE";
                btn.innerText = "🛑 Apagar Radar";
                btn.style.background = "#ff3333";
                indicator.innerText = "Modo Pasivo: Di 'Cosecha' para activar";
                indicator.style.color = "#39ff14";
                panel.style.borderColor = "#39ff14";
                recognition.start();
                speakFeedback("Radar en línea");
            } else {
                disableVoiceEngineVisuals();
                recognition.stop();
            }
        }

        function disableVoiceEngineVisuals() {
            isVoiceActive = false;
            voiceState = "IDLE";
            const btn = document.getElementById('btnVoice');
            const indicator = document.getElementById('voiceIndicator');
            const panel = document.getElementById('voicePanel');
            btn.innerText = "🎤 Activar Radar de Voz";
            btn.style.background = "#00ff66";
            indicator.innerText = "Sistema de voz apagado";
            indicator.style.color = "#8892b0";
            panel.style.borderColor = "#1f2937";
            panel.style.boxShadow = "none";
        }

        function restartVoiceEngine() {
            if (recognition && isVoiceActive) {
                try { recognition.stop(); } catch(e){}
                setTimeout(() => { if (isVoiceActive) recognition.start(); }, 300);
            }
        }

        // PROCESADOR Y CALCULADOR DE ENTRADAS POR VOZ
        function processHarvestVoice(phrase) {
            const daysWeek = ['lunes', 'martes', 'miercoles', 'jueves', 'viernes', 'sabado'];
            
            let targetDay = daysWeek.find(d => phrase.includes(d));
            let matchesNumeric = phrase.match(/\d+([.,]\d+)?/);
            let targetWeight = matchesNumeric ? matchesNumeric[0].replace(',', '.') : null;

            if (!targetDay || !targetWeight) {
                speakFeedback("No entendí. Repite día y peso.");
                return;
            }

            // Aislar nombre del recolector
            let cleanText = phrase.replace(targetDay, '').replace(matchesNumeric[0], '').replace('cosecha', '').trim();
            let matchedVendor = vendors.find(v => cleanText.includes(v.name.toLowerCase()) || v.name.toLowerCase().includes(cleanText));

            if (!matchedVendor) {
                speakFeedback(`Recolector ${cleanText} no existe`);
                return;
            }

            // 1. Inyección de datos inmediata en la matriz
            matchedVendor.weights[targetDay] = targetWeight;
            saveState();

            // 2. Ejecución forzada del motor de cálculo en caliente
            calculateTotals(matchedVendor.id);

            // 3. Actualizar campo de texto visual e iluminar de manera táctica
            const inputField = document.getElementById(`input_${matchedVendor.id}_${targetDay}`);
            if (inputField) {
                inputField.value = targetWeight;
                inputField.focus();
                inputField.style.borderColor = "#00ff66";
                setTimeout(() => { inputField.style.borderColor = "#1f2937"; inputField.blur(); }, 1200);
            }

            // 4. Confirmación por audio de la operación exitosa
            speakFeedback(`${matchedVendor.name}. ${targetDay}. ${targetWeight}. Calculado.`);
            
            // 5. Devolver radar a modo de espera pasiva
            voiceState = "IDLE";
            const panel = document.getElementById('voicePanel');
            const indicator = document.getElementById('voiceIndicator');
            panel.style.borderColor = "#39ff14";
            panel.style.boxShadow = "none";
            indicator.innerText = "Modo Pasivo: Di 'Cosecha' para activar";
            indicator.style.color = "#39ff14";
        }

        function speakFeedback(message) {
            if ('speechSynthesis' in window) {
                window.speechSynthesis.cancel();
                const utterance = new SpeechSynthesisUtterance(message);
                utterance.lang = 'es-CO';
                utterance.rate = 1.15; // Velocidad ligeramente acelerada para dinamismo en el campo
                window.speechSynthesis.speak(utterance);
            }
        }

        function clearAllData() {
            if (confirm('¿Deseas resetear por completo la planilla de cosecha semanal?')) {
                vendors = [];
                saveState();
                renderVendors();
            }
        }

        window.addEventListener('load', () => {
            renderVendors();
            if ('serviceWorker' in navigator) {
                navigator.serviceWorker.register('sw.js')
                    .then(() => console.log('SW Operativo'))
                    .catch(err => console.error('SW Error', err));
            }
        });
    </script>
</body>
</html>
